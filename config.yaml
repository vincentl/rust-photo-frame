# Example configuration for photoframe
# Adjust values to match your hardware, library layout, and visual preferences.

# Config schema version. Leave at 1 unless a release note tells you to change it;
# the binary rejects a version it doesn't understand with a clear message.
config-version: 1

# Root directory for images. Keep media in the managed subdirectories to
# separate synced libraries from ad-hoc drops:
#   cloud/ — populated by rclone or other sync jobs; safe to wipe/reseed.
#   local/ — manual imports (USB, scp) that should persist across syncs.
photo-library-path: /var/lib/photoframe/photos

# Unix domain socket path for runtime control commands
control-socket-path: /run/photoframe/control.sock

# Hardware button daemon configuration
buttond:
  # Optional explicit evdev device path (autodetects when null)
  device: null
  debounce-ms: 20
  single-window-ms: 250
  double-window-ms: 400
  force-shutdown: true # For systemctl: add -i and --no-ask-password
  shutdown-command:
    program: /usr/bin/systemctl
    args: [poweroff]
  screen:
    off-delay-ms: 3500
    display-name: null # Optional wlr-randr output name
    on-command:
      program: /opt/photoframe/bin/powerctl
      args: [wake]
    off-command:
      program: /opt/photoframe/bin/powerctl
      args: [sleep]

# Render/transition settings
transition:
  # Choose how the viewer advances through the entries below: fixed, random, or sequential.
  selection: random
  # Declare one or more transition entries. Repeat a kind to weight it more heavily.
  # These entries mirror the showcase tour's defaults, so keeping this file as-is
  # reproduces what `showcase.yaml` previews (minus the on-screen labels). Tweak
  # any value to taste, or delete entries you don't want.
  active:
    - kind: fade
      duration-ms: 400
      through-black: false # true: fade to black before revealing the next photo
    - kind: wipe
      duration-ms: 400
      angles: [0.0] # add angles (e.g. [0.0, 90.0, 180.0, 270.0]) for variety
      angle-jitter: 0.0 # randomize direction by ±this many degrees
      softness: 0.05
    - kind: push
      duration-ms: 400
      angles: [0.0]
      angle-jitter: 0.0
    - kind: e-ink
      duration-ms: 1600
      flash-count: 0
      reveal-portion: 0.55
      stripe-count: 24
      flash-color: [255, 255, 255]
    - kind: dissolve # threshold value-noise field by progress
      duration-ms: 600
      softness: 0.1 # 0 = hard per-pixel pop, up to ~0.5 = soft edge
      scale: 64.0 # noise cell size in pixels
    - kind: radial-wipe # circle or diamond reveal from center
      duration-ms: 500
      softness: 0.1
      shapes: [circle] # circle | diamond; list several for variety, e.g. [circle, diamond]
      center: [0.5, 0.5]
    - kind: venetian-blinds # horizontal/vertical stripe reveal
      duration-ms: 600
      stripe-count: 16
      softness: 0.1
      orientations: [horizontal] # list several, e.g. [horizontal, vertical]
    - kind: crossfade-zoom # fade combined with subtle scale
      duration-ms: 700
      zoom: 0.06
      current-zooms-in: true
      next-zooms-in: true
    - kind: iris # mechanical camera-iris: petals close over the photo, reopen on the next
      duration-ms: 2600
      blades: 9 # petal count (5-14); geometry is derived automatically
      color: [42, 42, 49] # base petal RGB; mid-dark shows the shading best
      petal-contrast: 0.45 # 0-1: directional sheen + per-petal tone variation
      overlap-shadow: 0.6 # 0-1: soft shadow each petal casts on its neighbor
      min-aperture: 0.05 # fraction of screen circumradius left open at the swap
      swirl: -0.45 # signed twist of the whole rosette while closing (0 = none)
# Global photo settings
global-photo-settings:
  # Dwell time (ms) the current image remains fully displayed before the next transition
  dwell-ms: 16000
  # GPU render oversample factor (1.0 = native to screen)
  oversample: 1.0
  # Maximum enlargement applied when fitting small photos
  max-upscale-factor: 1.0

# Greeting screen displayed while the first images are prepared
greeting-screen:
  message: "Warming up your photo memories…"
  font: "Macondo"
  stroke-width: 16
  duration-seconds: 6
  colors:
    background: "#f0e8d5"   # warm parchment
    font: "#2d3748"         # soft charcoal
    accent: "#7da8a5"       # tranquil sea-glass teal

# Sleep screen displayed when the frame is entering sleep mode
sleep-screen:
  message: "Tucking in for a nap…"
  font: "Macondo"
  stroke-width: 16
  colors:
    background: "#1e293b"   # deep slate blue
    font: "#f0e8d5"         # warm ivory
    accent: "#375978"       # muted indigo-teal

# Wake/sleep scheduling. buttond drives the frame via `set-state` commands on
# schedule boundaries. Without an awake-schedule block, buttond keeps the frame
# awake at all times (always-on behavior).
#
# To enable scheduled operation, uncomment the block below and adjust times and
# timezone to match your location. An empty list for a day-of-week key (e.g.
# friday: []) means "sleep all day" — remove the key to fall back to the daily
# windows instead.
#
# awake-schedule:
#   timezone: "America/New_York"    # IANA timezone name
#   awake-scheduled:
#     daily:                        # default window applied to all days
#       - ["07:15", "22:00"]
#     weekdays:                     # Mon–Thu; overrides daily
#       - ["06:45", "23:00"]
#     weekend:                      # Sat–Sun; overrides daily
#       - ["07:15", "12:00"]
#       - ["15:00", "23:30"]
#     friday: []                    # empty list = sleep all day Friday; remove this
#                                   # line to use the daily window on Fridays instead
#     saturday:
#       - ["08:00", "12:00"]
#       - ["16:00", "23:00"]

# Number of images to preload in the viewer (aligns with channel capacity)
viewer-preload-count: 3

# Concurrent image decodes in loader
loader-max-concurrent-decodes: 4

# Optional deterministic seed for the initial shuffle (set to null for random)
startup-shuffle-seed: null

photo-effect:
  # Choose how the viewer advances through the entries below when enabled.
  selection: random
  # Provide zero or more effect entries; leave empty to disable the stage.
  # Repeat entries (even with the same kind) to weight random selection or
  # alternate presets when using sequential mode.
  active: []
  # To enable print simulation (gallery lighting + paper texture), uncomment:
  # active:
  #   - kind: print-simulation
  #     light-angle-degrees: 135.0  # upper-left gallery lighting
  #     relief-strength: 0.30       # subtle paper texture
  #     ink-spread: 0.15            # slight ink absorption
  #     sheen-strength: 0.18        # gentle gloss
  #     paper-color: [245, 244, 240] # warm white
  #     debug: false  # true = left half only, for side-by-side comparison

playlist:
  new-multiplicity: 3
  half-life: 3 days

# Matting settings
matting:
  # Optional: render photos that are already close to the screen's aspect ratio
  # full-bleed (cover-cropped, no mat) to fully use a large display. Evaluated
  # per photo before mat selection; omit this block to disable.
  # fill-when-fits:
  #   maximum-crop-percentage: 5.0   # eligible if filling crops < 5% off one axis
  #   skip-matting-probability: 1.0  # 1.0 always fills eligible photos, 0.0 never, in between mixes
  # Choose how the viewer advances through the mats below: fixed, random, or sequential.
  selection: random
  # These entries mirror the showcase tour's defaults (every mat at
  # minimum-mat-percentage 6.0), so keeping this file as-is reproduces what
  # `showcase.yaml` previews. Tweak any value to taste, or delete mats you don't
  # want. Duplicate an entry (or list multiple colors/paths) to weight it more.
  active:
    - kind: fixed-color
      minimum-mat-percentage: 6.0
      colors:
        - [0, 0, 0] # add more swatches (e.g. - [32, 32, 32]) to rotate through them
    - kind: blur
      minimum-mat-percentage: 6.0
      sigma: 32.0
      sample-scale: 0.125 # raise toward 1.0 for sharper mats at higher cost
      backend: neon # options: cpu, neon (auto-falls back to cpu if unsupported)
    - kind: studio
      minimum-mat-percentage: 6.0
      colors: [photo-average] # [r,g,b] swatches and/or photo-average
      bevel-width-px: 3.0
      bevel-color: [255, 255, 255]
      texture-strength: 1.0 # 0.0 for smooth paper, 1.0 default weave
      warp-period-px: 5.6 # spacing between vertical warp threads in px
      weft-period-px: 5.2 # spacing between horizontal weft threads in px
    # fixed-image mat: drop your own JPEG/PNG files into
    # /var/lib/photoframe/backgrounds/ and uncomment this block.
    # List as many paths as you like; they are weighted equally.
    # - kind: fixed-image
    #   minimum-mat-percentage: 6.0
    #   path:
    #     - /var/lib/photoframe/backgrounds/my-background.jpg
    #   fit: cover # options: cover, contain, stretch
    - kind: gradient # linear or radial gradient between two colors
      minimum-mat-percentage: 6.0
      start-color: [20, 20, 28] # color at top/left/center
      end-color: [70, 70, 90] # color at bottom/right/edge
      direction: vertical # vertical | horizontal | radial
      angle-degrees: 0.0 # optional rotation for linear gradients
    - kind: vignette # solid color with darkened edges
      minimum-mat-percentage: 6.0
      # `color` accepts an [r,g,b] triple or photo-average; use `colors: [...]`
      # to rotate several base colors (each expands into its own slot).
      color: [241, 233, 210] # base mat color (parchment)
      strength: 0.6 # 0 = no darkening, 1 = edges go black
      radius: 0.75 # fraction of half-diagonal where darkening starts
      softness: 0.5 # how gradual the falloff is
    - kind: cinematic-blur # blurred photo background with darken + vignette overlay
      minimum-mat-percentage: 6.0
      sigma: 32.0
      sample-scale: 0.125
      backend: neon
      darken: 0.35 # 0 = no darkening, 1 = black overlay
      vignette-strength: 0.5
    - kind: passe-partout # clean 45° bevel mat board without linen weave
      minimum-mat-percentage: 6.0
      colors: [photo-average] # same palette format as studio
      bevel-width-px: 3.0
      bevel-color: [255, 255, 255]
    - kind: drop-shadow # soft drop shadow under the photo on a solid mat
      minimum-mat-percentage: 6.0
      # `color` accepts an [r,g,b] triple or photo-average; use `colors: [...]`
      # to rotate several mat colors (each expands into its own slot).
      color: [235, 235, 235] # mat background color
      shadow-color: [0, 0, 0]
      shadow-opacity: 0.4
      shadow-blur-px: 24.0
      shadow-offset-px: [0, 12] # [x, y] positive y = down
