# =============================================================================
# demo.yaml — a demo configuration for screenshots / a demo video.
#
# Goal: with a 2-second dwell, cycle deterministically through every transition
# family and every mat style in a single short lap, and showcase the
# `fill-when-fits` full-bleed behavior on near-16:9 photos.
#
# Assumes a 16:9 display. If your panel is a different shape, adjust the
# "fill" photos to match its aspect ratio.
#
# Drop the demo photos into the directory below (see demo/README.md for the
# 8-photo set), then run the frame with:
#   photoframe demo.yaml
# =============================================================================

# Absolute path: on the Pi the frame runs as a system service with an unknown
# working dir, so this cannot be relative. The library is scanned recursively.
# (For local testing on a dev machine, point this at a local folder instead.)
photo-library-path: /var/lib/photoframe/demo-photos

# Deterministic shuffle so the demo is reproducible across runs / recordings.
startup-shuffle-seed: 1

global-photo-settings:
  dwell-ms: 2000        # each photo holds for 2s before the next transition
  oversample: 1.0
  max-upscale-factor: 2.0   # generous so smaller demo photos still fill the screen

# Greeting screen displayed while the first images are prepared
greeting-screen:
  message: "Warming up your photo memories…"
  font: "Macondo"
  stroke-width: 16
  duration-seconds: 6
  colors:
    background: "#f0e8d5"   # warm parchment
    font: "#2d3748"         # soft charcoal
    accent: "#7da8a5"       # tranquil sea-glass teal

# Sleep screen displayed when the frame is entering sleep mode
sleep-screen:
  message: "Tucking in for a nap…"
  font: "Macondo"
  stroke-width: 16
  colors:
    background: "#1e293b"   # deep slate blue
    font: "#f0e8d5"         # warm ivory
    accent: "#375978"       # muted indigo-teal

viewer-preload-count: 3
loader-max-concurrent-decodes: 4

# Every photo appears exactly once per lap (no recency weighting) so the
# mat/transition cycles stay aligned and predictable for the demo.
playlist:
  new-multiplicity: 1
  half-life: 3650 days

# -----------------------------------------------------------------------------
# Transitions — sequential so they cycle in a fixed order, one per slide change.
# 7 distinct transitions: plain fade, fade-through-black, two wipe directions,
# two push directions, and an e-ink reveal.
# -----------------------------------------------------------------------------
transition:
  selection: sequential
  active:
    - kind: fade
      duration-ms: 450
    - kind: fade
      duration-ms: 700
      through-black: true
    - kind: wipe
      duration-ms: 600
      angle-list-degrees: [0.0]      # left → right
      softness: 0.08
    - kind: wipe
      duration-ms: 600
      angle-list-degrees: [90.0]     # top → bottom
      softness: 0.08
    - kind: push
      duration-ms: 520
      angle-list-degrees: [0.0]      # new image slides in from the left
    - kind: push
      duration-ms: 520
      angle-list-degrees: [90.0]     # new image slides in from the top
    - kind: e-ink
      duration-ms: 1600
      flash-count: 0
      reveal-portion: 0.55
      stripe-count: 24
      flash-color: [255, 255, 255]

# -----------------------------------------------------------------------------
# Matting — sequential so each matted photo shows the next style in order.
# 6 mat styles spanning all renderers: solid black, striking crimson, blurred
# backdrop, studio (photo-average), studio (fixed light swatch), and a
# fixed-image backdrop.
#
# `fill-when-fits` runs BEFORE this list: photos within 5% of the screen aspect
# render full-bleed (no mat) and do NOT consume a slot here, so the 6 styles
# stay aligned with the 6 non-fill photos.
# -----------------------------------------------------------------------------
matting:
  fill-when-fits:
    maximum-crop-percentage: 5.0    # near-16:9 photos fill the screen edge-to-edge
    skip-matting-probability: 1.0   # always fill eligible photos (deterministic demo)
  selection: sequential
  active:
    - kind: fixed-color             # 1. classic black
      colors: [[0, 0, 0]]
      minimum-mat-percentage: 4.0
    - kind: fixed-color             # 2. striking crimson
      colors: [[176, 30, 42]]
      minimum-mat-percentage: 6.0
    - kind: blur                    # 3. blurred backdrop of the photo itself
      minimum-mat-percentage: 4.0
      sigma: 28.0
      sample-scale: 0.125
      backend: neon                 # falls back to cpu automatically off ARM
    - kind: studio                  # 4. linen weave tinted to the photo's average
      colors: [photo-average]
      minimum-mat-percentage: 8.0
      bevel-width-px: 4.0
      bevel-color: [255, 255, 255]
      texture-strength: 1.0
    - kind: studio                  # 5. studio with a fixed light swatch
      colors: [[230, 230, 230]]
      minimum-mat-percentage: 7.0
      bevel-width-px: 4.0
      bevel-color: [255, 255, 255]
      texture-strength: 1.0
    - kind: fixed-image             # 6. your own backdrop image behind the photo
      minimum-mat-percentage: 6.0
      # Keep the backdrop OUTSIDE the photo library (a 16:9 image >=3840x2160),
      # or it would be picked up as a slideshow photo too.
      path: [/var/lib/photoframe/backgrounds/backdrop.jpg]
      fit: cover

# -----------------------------------------------------------------------------
# Photo effect — sequential pair of print-simulation presets so the gallery
# lighting visibly shifts between slides. Set `active: []` to turn the stage off
# if you'd rather show untouched photos.
# -----------------------------------------------------------------------------
photo-effect:
  selection: sequential
  active:
    - kind: print-simulation
      light-angle-degrees: 135.0
      relief-strength: 0.30
      ink-spread: 0.15
      sheen-strength: 0.18
      paper-color: [245, 244, 240]
    - kind: print-simulation
      light-angle-degrees: 45.0
      relief-strength: 0.30
      ink-spread: 0.15
      sheen-strength: 0.18
      paper-color: [245, 244, 240]

# =============================================================================
# PHOTO GUIDE: the 8-photo set, its aspect-ratio roles, and how to run this
# demo on the Pi are documented in demo/README.md (next to this file).
# =============================================================================
