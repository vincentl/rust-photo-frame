# =============================================================================
# showcase.yaml — a self-maintaining tour of EVERY transition and mat.
#
# NOTE: There is intentionally NO `transition:` or `matting:` block below.
# When `showcase.enabled: true`, the frame BUILDS those lists itself from its
# built-in effect registry and ignores any you write here. This is what keeps
# the tour from going stale: new effects appear automatically, with no edits.
#
# The tour cycles sequentially through every built-in effect. As of this
# writing the binary ships:
#
#   Transitions (8): fade, wipe, push, e-ink, dissolve, radial-wipe,
#                    venetian-blinds, crossfade-zoom
#   Mats (9):        fixed-color, blur, studio, fixed-image*, gradient,
#                    vignette, cinematic-blur, passe-partout, drop-shadow
#
#   * fixed-image is skipped unless the backdrop file referenced by
#     `showcase.fixed-image-path` (below) exists. The tour always reflects
#     whatever the binary supports, so this list is just a snapshot — to tune
#     any effect, copy its `kind` into your real config.yaml (docs/configure.md).
#
# Each frame is labeled in the bottom-left with the active transition and mat,
# e.g. "transition: crossfade-zoom    mat: passe-partout".
#
# Run it on the Pi with the helper scripts next to this file:
#   ./showcase/activate.sh     # back up your config, swap in this one, restart
#   ./showcase/deactivate.sh   # restore your normal config
#
# Put your media here first (see showcase/README.md):
#   /var/lib/photoframe/showcase/photos/                       (slideshow photos)
#   /var/lib/photoframe/showcase/backgrounds/background.jpg     (fixed-image mat)
# =============================================================================

# Config schema version (see config.yaml).
config-version: 1

# Showcase media lives under /var/lib/photoframe/showcase so the service user
# (kiosk) can read it. activate.sh creates these directories for you.
photo-library-path: /var/lib/photoframe/showcase/photos

# Deterministic shuffle so the tour is reproducible across runs.
startup-shuffle-seed: 1

global-photo-settings:
  dwell-ms: 4000          # hold each photo 4 s so you can read the caption
  oversample: 1.0
  max-upscale-factor: 2.0

greeting-screen:
  message: "Showcasing every transition and mat…"
  font: "Macondo"

sleep-screen:
  message: "Showcase complete."
  font: "Macondo"

viewer-preload-count: 3
loader-max-concurrent-decodes: 4

# Showcase mode. This is the ONLY block that drives the tour; `transition:` and
# `matting:` are deliberately omitted (see the header note above).
showcase:
  enabled: true
  caption: true           # set false for a clean screen-recording
  # Backdrop for the fixed-image mat. Kept OUTSIDE photos/ so it isn't shown as
  # a slideshow photo. If the file is missing, the fixed-image mat is skipped.
  fixed-image-path: /var/lib/photoframe/showcase/backgrounds/background.jpg
